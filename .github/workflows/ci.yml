name: CI

on:
  pull_request:
  push:
    branches:
      - fastapi

jobs:
  verify:
    name: Verify Project Stock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy .

      - name: Test
        run: uv run pytest
